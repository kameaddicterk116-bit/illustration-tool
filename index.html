<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん絵</title>

<style>
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
}

.card{
background:#fff;
padding:24px;
width:100%;
max-width:420px;
border-radius:16px;
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
background:#111;
color:#fff;
font-size:16px;
}

canvas{
margin-top:20px;
display:block;
margin-left:auto;
margin-right:auto;
background:white;
border-radius:12px;
}

.info{
margin-top:12px;
text-align:center;
color:#666;
}
</style>
</head>

<body>

<div class="card">

<h1>かんたん絵</h1>

<input id="input" placeholder="ネコ、犬、ゾウ、消防士">

<button id="btn">描く</button>

<div id="info" class="info"></div>

<canvas id="c" width="280" height="280"></canvas>

</div>

<script>

const input = document.getElementById("input");
const btn = document.getElementById("btn");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

function normalize(t){
return t.normalize("NFKC").replace(/[\s　]+/g,"");
}

function extract(text){

const t = normalize(text);

if(/ネコ|猫|ねこ/.test(t)) return "cat";
if(/犬|いぬ/.test(t)) return "dog";
if(/ゾウ|象/.test(t)) return "elephant";
if(/消防/.test(t)) return "fire";

return "symbol";
}

function draw(type){

ctx.clearRect(0,0,280,280);
ctx.lineWidth = 6;
ctx.lineCap = "round";
ctx.strokeStyle = "black";

if(type === "cat"){
// ears
ctx.beginPath();
ctx.moveTo(80,140);
ctx.lineTo(110,80);
ctx.lineTo(140,140);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(140,140);
ctx.lineTo(170,80);
ctx.lineTo(200,140);
ctx.stroke();

// whisker
ctx.beginPath();
ctx.moveTo(100,170);
ctx.lineTo(200,170);
ctx.stroke();
}

else if(type === "dog"){
ctx.beginPath();
ctx.arc(140,150,40,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(180,180);
ctx.quadraticCurveTo(220,200,200,250);
ctx.stroke();
}

else if(type === "elephant"){
ctx.beginPath();
ctx.arc(100,120,25,0,Math.PI*2);
ctx.arc(180,120,25,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(140,120);
ctx.lineTo(140,240);
ctx.stroke();
}

else if(type === "fire"){
ctx.beginPath();
ctx.moveTo(100,180);
ctx.quadraticCurveTo(140,80,180,180);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(120,180);
ctx.lineTo(200,250);
ctx.stroke();
}

else{
// symbol
ctx.beginPath();
ctx.moveTo(80,160);
ctx.quadraticCurveTo(140,80,200,160);
ctx.stroke();
}

info.textContent = type;
}

btn.addEventListener("click", ()=>{

const text = input.value;
if(!text) return;

const type = extract(text);
draw(type);

});

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") btn.click();
});

</script>

</body>
</html>
