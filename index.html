<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>特徴だけ描く</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:sans-serif;
background:#f5f5f5;
padding:24px;
display:flex;
justify-content:center;
}
.card{
width:100%;
max-width:460px;
background:#fff;
padding:24px;
border-radius:20px;
}
h1{
margin-bottom:8px;
}
.sub{
color:#666;
margin-bottom:18px;
}
input{
width:100%;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:12px;
}
button{
margin-top:14px;
width:100%;
padding:14px;
border:none;
background:black;
color:white;
border-radius:12px;
font-size:16px;
}
#canvas{
margin-top:20px;
display:flex;
justify-content:center;
}
svg{
width:280px;
height:280px;
}
.info{
margin-top:12px;
color:#666;
font-size:14px;
text-align:center;
}
.download{
display:block;
margin-top:14px;
text-align:center;
padding:12px;
border:1px solid black;
border-radius:10px;
text-decoration:none;
color:black;
}
</style>
</head>
<body>
<div class="card">
<h1>特徴だけ描く</h1>
<div class="sub">
AIで特徴を減らして描く
</div>
<input
id="subject"
placeholder="ネコ、消防士、掃除機、キリン">
<button
id="generate">
描く
</button>
<div
class="info"
id="info">
</div>
<div
id="canvas">
</div>
<div
id="save">
</div>
</div>
<script>
async function extractFeatures(name){
const text=name.toLowerCase();
if(
/猫|ネコ|cat/
.test(text)
){
return[
"ears",
"whiskers"
];
}
if(
/犬|イヌ|dog/
.test(text)
){
return[
"ears",
"tail"
];
}
if(
/ゾウ|elephant/
.test(text)
){
return[
"ear",
"trunk"
];
}
if(
/消防/
.test(text)
){
return[
"helmet",
"hose"
];
}
if(
/宇宙/
.test(text)
){
return[
"helmet",
"body"
];
}
if(
/車|car/
.test(text)
){
return[
"wheel",
"body"
];
}
if(
/料理/
.test(text)
){
return[
"hat",
"body"
];
}
return[
"shape"
];
}
function render(parts){
let shapes=[];
if(
parts.includes(
"ears"
)
){
shapes.push(
`<polygon points="90,120 115,70 130,120"/>`
);
shapes.push(
`<polygon points="150,120 170,70 190,120"/>`
);
}
if(
parts.includes(
"whiskers"
)
){
shapes.push(
`<line x1="70" y1="150" x2="120" y2="150"/>`
);
shapes.push(
`<line x1="160" y1="150" x2="210" y2="150"/>`
);
}
if(
parts.includes(
"tail"
)
){
shapes.push(
`<path d="M200 170 Q240 150 220 220"/>`
);
}
if(
parts.includes(
"ear"
)
){
shapes.push(
`<circle cx="90" cy="150" r="20"/>`
);
shapes.push(
`<circle cx="190" cy="150" r="20"/>`
);
}
if(
parts.includes(
"trunk"
)
){
shapes.push(
`<line x1="140" y1="120" x2="140" y2="240"/>`
);
}
if(
parts.includes(
"helmet"
)
){
shapes.push(
`<circle cx="140" cy="140" r="60"/>`
);
}
if(
parts.includes(
"hose"
)
){
shapes.push(
`<path d="M120 180 Q200 180 220 220"/>`
);
}
if(
parts.includes(
"wheel"
)
){
shapes.push(
`<circle cx="90" cy="180" r="20"/>`
);
shapes.push(
`<circle cx="190" cy="180" r="20"/>`
);
}
if(
parts.includes(
"body"
)
){
shapes.push(
`<rect x="90" y="120" width="100" height="60"/>`
);
}
if(
parts.includes(
"hat"
)
){
shapes.push(
`<rect x="95" y="80" width="90" height="30"/>`
);
}
if(
parts.includes(
"shape"
)
){
shapes.push(
`<circle cx="140" cy="140" r="60"/>`
);
}
return `
<svg
viewBox="0 0 280 280"
fill="none"
stroke="black"
stroke-width="8"
stroke-linecap="round">
${shapes.join("")}
</svg>
`;
}
generate.onclick=
async()=>{
const value=
subject.value.trim();
if(
!value
){
return;
}
info.textContent=
"特徴抽出中…";
const features=
await extractFeatures(
value
);
info.textContent=
"残した特徴："
+
features.join(
" ・ "
);
const svg=
render(
features
);
canvas.innerHTML=
svg;
const blob=
new Blob(
[svg],
{
type:
"image/svg+xml"
}
);
const url=
URL.createObjectURL(
blob
);
save.innerHTML=
`
<a
class="download"
href="${url}"
download="${value}.svg">
保存
</a>
`;
};
</script>
</body>
</html>
