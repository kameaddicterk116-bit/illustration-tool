<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>もっとシンプルに！らくがきツール</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #fff; }
  .card { width: 100%; max-width: 400px; text-align: center; }
  input { width: 100%; padding: 15px; margin-bottom: 15px; border: 4px solid #000; border-radius: 20px; box-sizing: border-box; font-size: 1.1rem; }
  button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
  #result { margin-top: 20px; }
  img { width: 100%; border: 4px solid #000; border-radius: 20px; }
</style>
</head>
<body>
<div class="card">
  <h3>だれをかく？</h3>
  <input type="text" id="subject" placeholder="特徴を教えて（例：メガネの30代男性）">
  <button id="btn">らくがき生成！</button>
  <div id="result"></div>
</div>

<script>
document.getElementById('btn').addEventListener('click', () => {
  const sub = document.getElementById('subject').value;
  const result = document.getElementById('result');
  
  // プロンプトを「究極の幼児画」に調整
  // "toddler drawing", "very few lines", "crayon", "symbolic" を強調
  const prompt = encodeURIComponent(`${sub}, full body, toddler drawing, crayon on paper, extremely simple, very few lines, stick figure style, symbolic, minimalist, white background, no complex details, child art`);
  const url = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random() * 100000)}`;
  
  result.innerHTML = "かいてるよ…";
  const img = new Image();
  img.onload = () => result.innerHTML = `<img src="${url}">`;
  img.src = url;
});
</script>
</body>
</html>
