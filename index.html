<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1">
<title>5秒で描ける絵</title>
<style>
body{
margin:0;
font-family:sans-serif;
background:#fafafa;
display:flex;
justify-content:center;
padding:20px;
}
.card{
width:100%;
max-width:420px;
background:white;
padding:20px;
border-radius:16px;
}
h1{
margin-bottom:8px;
}
p{
color:#666;
margin-bottom:16px;
}
input{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:12px;
}
button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
}
img{
width:100%;
margin-top:16px;
}
</style>
</head>
<body>
<div class="card">
<h1>
5秒で描ける絵
</h1>
<p>
特徴ひとつだけ
</p>
<input
id="subject"
placeholder="ネコ、ゾウ、消防士">
<button
id="go">
生成
</button>
<div id="result"></div>
</div>
<script>
const map={
ネコ:"cat ears",
イヌ:"dog ears",
キツネ:"fox ears",
ゾウ:"trunk",
ウサギ:"long ears",
パンダ:"black eyes",
ペンギン:"oval",
宇宙飛行士:"helmet",
料理人:"chef hat",
医者:"stethoscope"
};
function make(subject){
return encodeURIComponent(`
icon.
3 strokes.
only circles.
only one feature.
unfinished.
child drawing.
black line.
white background.
${subject}
`);
}
go.onclick=()=>{
const raw=
subject.value.trim();
if(!raw){
return;
}
const simple=
map[raw]
||
raw;
const url=
`https://image.pollinations.ai/prompt/${make(simple)}?width=512&height=512&seed=${Math.random()*99999}&nologo=true`;
result.innerHTML=`
<img src="${url}">
`;
};
</script>
</body>
</html>
