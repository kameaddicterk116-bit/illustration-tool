<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>究極のシンプル・アイコン生成</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #fff; }
  .card { width: 100%; max-width: 400px; text-align: center; }
  input { width: 100%; padding: 15px; margin-bottom: 15px; border: 4px solid #000; border-radius: 24px; box-sizing: border-box; font-size: 1.1rem; }
  button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 24px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
  #result { margin-top: 20px; }
  img { width: 100%; border: 4px solid #000; border-radius: 24px; }
</style>
</head>
<body>
<div class="card">
  <h3>オリジナルアイコン生成</h3>
  <input type="text" id="subject" placeholder="特徴を教えて（例：丸メガネの男の子）">
  <button id="btn">生成する！</button>
  <div id="result"></div>
</div>

<script>
document.getElementById('btn').addEventListener('click', () => {
  const sub = document.getElementById('subject').value;
  const result = document.getElementById('result');
  
  // プロンプトを「図形的なアイコンデザイン」に極振りしました
  // 「円」「太い線」「フラットな色」のみで構成させ、人間らしさを記号に置き換えます
  const prompt = encodeURIComponent(`${sub}, minimalist mascot logo, flat vector art, extremely simple, geometric shapes, bold clean black lines, one or two colors, white background, no shading, high contrast, unique shape, easy to draw`);
  const url = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random() * 100000)}`;
  
  result.innerHTML = "かいてるよ…";
  const img = new Image();
  img.onload = () => result.innerHTML = `<img src="${url}">`;
  img.src = url;
});
</script>
</body>
</html>
