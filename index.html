<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>究極のシンプル記号生成</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #fff; }
  .card { width: 100%; max-width: 400px; text-align: center; }
  input { width: 100%; padding: 15px; margin-bottom: 15px; border: 4px solid #000; border-radius: 12px; box-sizing: border-box; font-size: 1.1rem; }
  button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
  #result { margin-top: 20px; }
  img { width: 100%; border: 4px solid #000; border-radius: 12px; }
</style>
</head>
<body>
<div class="card">
  <h3>だれの特徴？（例：めがねの男の子）</h3>
  <input type="text" id="subject" placeholder="特徴を入力">
  <button id="btn">生成</button>
  <div id="result"></div>
</div>

<script>
document.getElementById('btn').addEventListener('click', () => {
  const sub = document.getElementById('subject').value;
  const result = document.getElementById('result');
  
  // AIを「絵描き」ではなく「アイコンデザイナー」として強制定義するプロンプト
  const prompt = encodeURIComponent(`${sub}, simple character icon, circular head, minimalist style, thick black vector outline, no colors, no shading, white background, flat, high contrast, symbol, easy to draw, 2D design`);
  const url = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random() * 100000)}`;
  
  result.innerHTML = "かいてるよ…";
  const img = new Image();
  img.onload = () => result.innerHTML = `<img src="${url}">`;
  img.src = url;
});
</script>
</body>
</html>
