<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん絵</title>

<style>
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#eee;
display:flex;
justify-content:center;
}

.card{
background:white;
padding:24px;
width:100%;
max-width:420px;
border-radius:16px;
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
background:#111;
color:white;
font-size:16px;
}

canvas{
margin-top:20px;
display:block;
margin-left:auto;
margin-right:auto;
background:#fff;
border-radius:12px;
}

.info{
margin-top:12px;
text-align:center;
color:#666;
}
</style>
</head>

<body>

<div class="card">

<h1>かんたん絵</h1>

<input id="input" placeholder="ネコ / 犬 / ゾウ / 消防士">

<button id="btn">描く</button>

<div id="info" class="info"></div>

<canvas id="cv" width="280" height="280"></canvas>

</div>

<script>

const input = document.getElementById("input");
const btn = document.getElementById("btn");
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

function clean(t){
return t.normalize("NFKC").replace(/\s|　/g,"");
}

function detect(t){
t = clean(t);

if(t.includes("ネコ") || t.includes("猫") || t.includes("ねこ")){
return "cat";
}
if(t.includes("犬") || t.includes("いぬ")){
return "dog";
}
if(t.includes("ゾウ") || t.includes("象")){
return "elephant";
}
if(t.includes("消防")){
return "fire";
}
return "symbol";
}

function clear(){
ctx.clearRect(0,0,280,280);
ctx.lineWidth = 6;
ctx.lineCap = "round";
ctx.strokeStyle = "black";
}

function draw(type){

clear();

if(type === "cat"){

// ears
ctx.beginPath();
ctx.moveTo(70,150);
ctx.lineTo(110,80);
ctx.lineTo(140,150);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(140,150);
ctx.lineTo(180,80);
ctx.lineTo(210,150);
ctx.stroke();

// whiskers
ctx.beginPath();
ctx.moveTo(100,180);
ctx.lineTo(200,180);
ctx.stroke();

}

else if(type === "dog"){

ctx.beginPath();
ctx.arc(140,150,40,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(180,180);
ctx.quadraticCurveTo(220,200,210,250);
ctx.stroke();

}

else if(type === "elephant"){

ctx.beginPath();
ctx.arc(100,120,25,0,Math.PI*2);
ctx.arc(180,120,25,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(140,120);
ctx.lineTo(140,250);
ctx.stroke();

}

else if(type === "fire"){

ctx.beginPath();
ctx.moveTo(100,200);
ctx.quadraticCurveTo(140,80,180,200);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(120,200);
ctx.lineTo(200,250);
ctx.stroke();

}

else{

ctx.beginPath();
ctx.moveTo(80,160);
ctx.quadraticCurveTo(140,60,200,160);
ctx.stroke();

}

info.textContent = type;
}

btn.onclick = () => {
const t = input.value;
if(!t) return;
draw(detect(t));
};

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") btn.click();
});

</script>

</body>
</html>
