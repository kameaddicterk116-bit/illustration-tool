<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん絵</title>

<style>
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
}

.card{
background:white;
padding:24px;
width:100%;
max-width:420px;
border-radius:16px;
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
background:black;
color:white;
}

#canvas{
margin-top:20px;
display:flex;
justify-content:center;
}

svg{
width:280px;
height:280px;
}

.info{
margin-top:12px;
color:#666;
text-align:center;
}
</style>

</head>

<body>

<div class="card">

<h1>かんたん絵</h1>
<p>特徴だけ残す</p>

<input id="subject" placeholder="ネコ、消防士、ゾウ">

<button id="generate">描く</button>

<div class="info" id="info"></div>

<div id="canvas"></div>

</div>

<script>

const input = document.getElementById("subject");
const button = document.getElementById("generate");
const canvas = document.getElementById("canvas");
const info = document.getElementById("info");

function extract(word){

if(/ネコ|猫/.test(word)){
return ["ears","whiskers"];
}

if(/犬/.test(word)){
return ["ears","tail"];
}

if(/ゾウ/.test(word)){
return ["ear","trunk"];
}

if(/消防/.test(word)){
return ["helmet","hose"];
}

return ["symbol"];
}

function render(features){

const out = [];

if(features.includes("ears")){
out.push(`<path d="M90 120 L120 70 L140 120"/>`);
out.push(`<path d="M140 120 L170 70 L190 120"/>`);
}

if(features.includes("whiskers")){
out.push(`<line x1="70" y1="160" x2="120" y2="160"/>`);
out.push(`<line x1="160" y1="160" x2="210" y2="160"/>`);
}

if(features.includes("tail")){
out.push(`<path d="M180 170 Q230 170 210 230"/>`);
}

if(features.includes("ear")){
out.push(`<circle cx="90" cy="140" r="18"/>`);
out.push(`<circle cx="190" cy="140" r="18"/>`);
}

if(features.includes("trunk")){
out.push(`<line x1="140" y1="100" x2="140" y2="240"/>`);
}

if(features.includes("helmet")){
out.push(`<path d="M90 120 Q140 70 190 120"/>`);
}

if(features.includes("hose")){
out.push(`<path d="M120 170 Q220 170 220 230"/>`);
}

if(features.includes("symbol")){
out.push(`<path d="M90 140 Q140 80 190 140"/>`);
}

return `
<svg viewBox="0 0 280 280" fill="none" stroke="black" stroke-width="8" stroke-linecap="round">
${out.join("")}
</svg>
`;
}

button.addEventListener("click", () => {

const text = input.value.trim();

if(!text){
return;
}

const features = extract(text);

info.textContent = features.join(" ・ ");

canvas.innerHTML = render(features);

});

input.addEventListener("keydown", (e) => {
if(e.key === "Enter"){
button.click();
}
});

</script>

</body>
</html>
