<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1">
<title>まるかきイラスト</title>
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}
body{
font-family:
-apple-system,
"Hiragino Sans";
background:#f7f7f7;
padding:24px;
display:flex;
justify-content:center;
}
.card{
background:white;
width:100%;
max-width:420px;
padding:24px;
border-radius:24px;
box-shadow:
0 8px 24px
rgba(0,0,0,.08);
}
h1{
font-size:28px;
margin-bottom:6px;
}
.sub{
color:#777;
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
font-size:18px;
margin-bottom:18px;
}
.style{
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:18px;
}
.style label{
display:flex;
gap:10px;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:black;
color:white;
font-size:18px;
}
button:disabled{
opacity:.5;
}
.status{
margin-top:14px;
text-align:center;
color:#666;
}
.result{
margin-top:18px;
}
.result img{
width:100%;
border-radius:16px;
}
.download{
display:block;
margin-top:10px;
text-align:center;
padding:12px;
border-radius:12px;
border:1px solid black;
color:black;
text-decoration:none;
}
</style>
</head>
<body>
<div class="card">
<h1>
まるかき
</h1>
<p class="sub">
だれでも描けるくらい簡単
</p>
<input
id="subject"
placeholder=
"ネコ、パンダ、宇宙飛行士"
>
<div class="style">
<label>
<input
checked
type="radio"
name="style"
value="ultra simple mascot">
まる顔
</label>
<label>
<input
type="radio"
name="style"
value="single color mascot">
1色
</label>
</div>
<button id="btn">
生成
</button>
<div
class="status"
id="status">
</div>
<div
class="result"
id="result">
</div>
</div>
<script>
const normalize={
"犬":"イヌ",
"猫":"ネコ",
"狐":"キツネ"
};
const featureMap={
"ネコ":
"round face cat, triangle ears",
"イヌ":
"round face dog, floppy ears",
"キツネ":
"round face fox, fluffy tail",
"パンダ":
"round panda",
"クマ":
"round bear",
"ウサギ":
"round rabbit, long ears",
"ペンギン":
"round penguin",
"ゾウ":
"round elephant",
"宇宙飛行士":
"round face, helmet",
"料理人":
"round face, chef hat",
"医者":
"round face, stethoscope",
"消防士":
"round face, helmet",
"アインシュタイン":
"round face, messy white hair"
};
function buildPrompt(subject){
return encodeURIComponent(`
cute mascot,
ultra minimal,
single outline,
big round head,
tiny body,
dot eyes,
tiny mouth,
maximum 2 features,
empty white background,
flat drawing,
child can redraw,
no realism,
no details,
no texture,
no fingers,
icon only,
recognizable silhouette,
${subject}
`);
}
document
.getElementById("btn")
.addEventListener(
"click",
()=>{
const raw=
document
.getElementById(
"subject"
)
.value
.trim();
const status=
document
.getElementById(
"status"
);
const result=
document
.getElementById(
"result"
);
const btn=
document
.getElementById(
"btn"
);
if(!raw){
status.textContent=
"入力してください";
return;
}
const fixed=
normalize[raw]
||
raw;
const subject=
featureMap[fixed]
||
`round mascot of ${fixed}`;
const prompt=
buildPrompt(subject);
const seed=
Math.floor(
Math.random()
*999999
);
const url=
`https://image.pollinations.ai/prompt/${prompt}?seed=${seed}&width=640&height=640&nologo=true`;
btn.disabled=true;
status.textContent=
"描いてる…";
result.innerHTML="";
const img=
new Image();
img.onload=()=>{
result.innerHTML=`
<img src="${url}">
<a
class="download"
href="${url}"
target="_blank"
download="${fixed}.png">
保存
</a>
`;
status.textContent=
"完成";
btn.disabled=false;
};
img.onerror=()=>{
status.textContent=
"失敗";
btn.disabled=false;
};
img.src=url;
}
);
</script>
</body>
</html>
