<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん絵</title>

<style>
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
}

.card{
background:#fff;
padding:24px;
width:100%;
max-width:420px;
border-radius:16px;
}

h1{margin-top:0;}

input{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
background:#111;
color:#fff;
font-size:16px;
cursor:pointer;
}

#canvas{
margin-top:20px;
display:flex;
justify-content:center;
}

svg{
width:280px;
height:280px;
}

.info{
margin-top:12px;
text-align:center;
color:#666;
}
</style>
</head>

<body>

<div class="card">
<h1>かんたん絵</h1>
<p>ことば → かたち</p>

<input id="input" placeholder="ネコ、犬、ゾウ、消防士">

<button id="btn">描く</button>

<div id="info" class="info"></div>
<div id="canvas"></div>
</div>

<script>

const input = document.getElementById("input");
const btn = document.getElementById("btn");
const canvas = document.getElementById("canvas");
const info = document.getElementById("info");


// 🧠 入力ゆるく受ける（ここが超重要）
function normalizeText(text){
return text
.normalize("NFKC")
.replace(/[\s　]+/g,"")   // スペース全削除
.replace(/[、,]/g,"");    // 読点削除
}


// 🧠 判定
function extract(text){

const t = normalizeText(text);

console.log("INPUT:", text);
console.log("CLEAN:", t);

if(/ネコ|猫|ねこ/.test(t)){
return ["ear","whisker"];
}

if(/犬|いぬ/.test(t)){
return ["ear","tail"];
}

if(/ゾウ|象/.test(t)){
return ["ear","trunk"];
}

if(/消防/.test(t)){
return ["helmet","hose"];
}

return ["symbol"];
}


// 🎨 描画
function render(features){

let out = [];

if(features.includes("ear")){
out.push(`
<circle cx="80" cy="120" r="20"/>
<circle cx="200" cy="120" r="20"/>
`);
}

if(features.includes("whisker")){
out.push(`
<line x1="90" y1="160" x2="140" y2="160"/>
<line x1="160" y1="160" x2="210" y2="160"/>
`);
}

if(features.includes("tail")){
out.push(`
<path d="M200 180 Q240 180 220 240"/>
`);
}

if(features.includes("trunk")){
out.push(`
<path d="M140 120 Q140 200 140 250"/>
`);
}

if(features.includes("helmet")){
out.push(`
<path d="M80 120 Q140 60 200 120"/>
`);
}

if(features.includes("hose")){
out.push(`
<path d="M120 180 Q200 180 220 240"/>
`);
}

if(features.includes("symbol")){
out.push(`
<path d="M80 160 Q140 80 200 160"/>
`);
}

return `
<svg viewBox="0 0 280 280"
fill="none"
stroke="black"
stroke-width="6"
stroke-linecap="round">
${out.join("")}
</svg>
`;
}


// 🚀 実行
btn.addEventListener("click", ()=>{

const text = input.value;
if(!text) return;

const features = extract(text);

info.textContent = features.join(" ・ ");

canvas.innerHTML = render(features);

});

input.addEventListener("keydown",(e)=>{
if(e.key === "Enter") btn.click();
});

</script>

</body>
</html>
