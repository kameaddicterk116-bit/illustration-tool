<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん記号イラスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:sans-serif;
background:#f5f5f5;
padding:24px;
display:flex;
justify-content:center;
}
.card{
background:white;
padding:24px;
width:100%;
max-width:420px;
border-radius:18px;
}
h1{
margin-bottom:8px;
}
.sub{
color:#666;
margin-bottom:18px;
}
input{
width:100%;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:14px;
}
button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:12px;
}
#canvas{
margin-top:20px;
display:flex;
justify-content:center;
}
svg{
width:280px;
height:280px;
}
.download{
display:block;
margin-top:14px;
padding:12px;
text-align:center;
border:1px solid black;
text-decoration:none;
color:black;
border-radius:10px;
}
.small{
font-size:13px;
color:#777;
margin-top:8px;
text-align:center;
}
</style>
</head>
<body>
<div class="card">
<h1>かんたん記号イラスト</h1>
<div class="sub">
特徴だけ残して描く
</div>
<input
id="subject"
placeholder="ネコ、消防士、キリン、掃除機">
<button id="drawBtn">
描く
</button>
<div id="canvas"></div>
<div id="save"></div>
<div
class="small"
id="hint">
</div>
</div>
<script>
const rules=[
{
match:
/ネコ|猫|キツネ|クマ|パンダ|イヌ|犬|動物/,
parts:
["face","ears"]
},
{
match:
/ゾウ|キリン|恐竜/,
parts:
["face","long"]
},
{
match:
/消防|宇宙|医者|料理|人/,
parts:
["face","hat"]
},
{
match:
/車|電車|飛行機/,
parts:
["box","wheel"]
}
];
function detect(name){
for(
const r
of rules
){
if(
r.match
.test(name)
){
return r.parts;
}
}
return[
"face"
];
}
function svg(parts){
let out=[];
if(
parts.includes(
"face"
)
){
out.push(
`<circle cx="140" cy="150" r="55"/>`
);
}
if(
parts.includes(
"ears"
)
){
out.push(
`<polygon points="95,100 115,60 135,100"/>`
);
out.push(
`<polygon points="145,100 165,60 185,100"/>`
);
}
if(
parts.includes(
"long"
)
){
out.push(
`<line x1="140" y1="200" x2="140" y2="250"/>`
);
}
if(
parts.includes(
"hat"
)
){
out.push(
`<rect x="90" y="55" width="100" height="30"/>`
);
}
if(
parts.includes(
"box"
)
){
out.push(
`<rect x="70" y="110" width="140" height="70"/>`
);
}
if(
parts.includes(
"wheel"
)
){
out.push(
`<circle cx="90" cy="190" r="18"/>`
);
out.push(
`<circle cx="190" cy="190" r="18"/>`
);
}
return `
<svg
viewBox="0 0 280 280"
fill="none"
stroke="black"
stroke-width="8"
stroke-linecap="round"
stroke-linejoin="round">
${out.join("")}
</svg>
`;
}
drawBtn.onclick=()=>{
const value=
subject.value.trim();
if(
!value
){
return;
}
const parts=
detect(
value
);
hint.textContent=
"残した特徴："
+
parts.join(
"・"
);
const picture=
svg(
parts
);
canvas.innerHTML=
picture;
const blob=
new Blob(
[picture],
{
type:
"image/svg+xml"
}
);
const url=
URL.createObjectURL(
blob
);
save.innerHTML=
`
<a
class="download"
href="${url}"
download="${value}.svg">
保存
</a>
`;
};
</script>
</body>
</html>
