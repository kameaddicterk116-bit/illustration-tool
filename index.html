<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>特徴だけ描く</title>
<style>
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
}
.card{
width:100%;
max-width:420px;
background:white;
padding:24px;
border-radius:18px;
}
input{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:12px;
}
button{
width:100%;
padding:14px;
border:none;
background:black;
color:white;
}
img{
width:100%;
margin-top:18px;
}
#status{
margin-top:10px;
color:#666;
}
</style>
</head>
<body>
<div class="card">
<h1>特徴だけ描く</h1>
<p>
AIで特徴を減らして描く
</p>
<input
id="subject"
placeholder="ネコ、消防士、掃除機">
<button
id="go">
描く
</button>
<div
id="status">
</div>
<div
id="result">
</div>
</div>
<script>
async function simplify(name){
const dict={
ネコ:
"cat ears whiskers",
犬:
"dog ears",
キツネ:
"fox ears tail",
ゾウ:
"elephant trunk",
消防士:
"helmet hose",
宇宙飛行士:
"helmet",
車:
"car wheels",
掃除機:
"hose",
キリン:
"long neck"
};
return (
dict[name]
||
name
);
}
function makePrompt(feature){
return encodeURIComponent(`
${feature}
very simple icon
few lines
child drawing
minimal detail
empty background
easy to redraw
black outline
`);
}
go.onclick=
async()=>{
const text=
subject.value.trim();
if(!text){
return;
}
status.textContent=
"考え中…";
const feature=
await simplify(
text
);
status.textContent=
feature;
const url=
`https://image.pollinations.ai/prompt/${makePrompt(feature)}?width=640&height=640&seed=${Math.random()*99999}&nologo=true`;
result.innerHTML=
`<img src="${url}">`;
};
</script>
</body>
</html>
