<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん絵</title>

<style>
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#eee;
display:flex;
justify-content:center;
}

.card{
background:white;
padding:24px;
width:100%;
max-width:420px;
border-radius:16px;
text-align:center;
}

button{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
background:#111;
color:white;
font-size:18px;
border-radius:12px;
}

canvas{
margin-top:20px;
background:#fff;
border-radius:12px;
display:block;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<div class="card">

<h1>かんたん絵</h1>

<button onclick="drawCat()">🐱 ネコ</button>
<button onclick="drawDog()">🐶 イヌ</button>
<button onclick="drawElephant()">🐘 ゾウ</button>
<button onclick="drawFire()">🚒 消防車</button>

<canvas id="cv" width="280" height="280"></canvas>

</div>

<script>

const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");

function clear(){
ctx.clearRect(0,0,280,280);
ctx.fillStyle = "black";
ctx.strokeStyle = "black";
}

// =====================
// 🐱 ネコ
// =====================
function drawCat(){
clear();

// 顔
ctx.beginPath();
ctx.arc(140,150,70,0,Math.PI*2);
ctx.fill();

// 耳
ctx.beginPath();
ctx.arc(95,85,25,0,Math.PI*2);
ctx.arc(185,85,25,0,Math.PI*2);
ctx.fill();

// 目（白）
ctx.fillStyle = "white";
ctx.beginPath();
ctx.arc(120,150,10,0,Math.PI*2);
ctx.arc(160,150,10,0,Math.PI*2);
ctx.fill();

// 目（黒）
ctx.fillStyle = "black";
ctx.beginPath();
ctx.arc(120,150,5,0,Math.PI*2);
ctx.arc(160,150,5,0,Math.PI*2);
ctx.fill();

// 口
ctx.beginPath();
ctx.arc(140,175,15,0,Math.PI);
ctx.stroke();
}

// =====================
// 🐶 イヌ
// =====================
function drawDog(){
clear();

// 顔
ctx.beginPath();
ctx.arc(140,150,75,0,Math.PI*2);
ctx.fill();

// 耳（垂れ）
ctx.beginPath();
ctx.ellipse(85,120,20,40,0,0,Math.PI*2);
ctx.ellipse(195,120,20,40,0,0,Math.PI*2);
ctx.fill();

// 鼻
ctx.beginPath();
ctx.arc(140,165,12,0,Math.PI*2);
ctx.fill();
}

// =====================
// 🐘 ゾウ
// =====================
function drawElephant(){
clear();

// 頭
ctx.beginPath();
ctx.arc(140,140,80,0,Math.PI*2);
ctx.fill();

// 耳
ctx.beginPath();
ctx.arc(80,140,40,0,Math.PI*2);
ctx.arc(200,140,40,0,Math.PI*2);
ctx.fill();

// 鼻
ctx.beginPath();
ctx.moveTo(140,140);
ctx.quadraticCurveTo(170,200,150,270);
ctx.stroke();
}

// =====================
// 🚒 消防車
// =====================
function drawFire(){
clear();

// 車体
ctx.fillRect(70,140,140,60);

// タイヤ
ctx.beginPath();
ctx.arc(100,210,15,0,Math.PI*2);
ctx.arc(180,210,15,0,Math.PI*2);
ctx.fill();

// 上部ライト
ctx.fillRect(90,120,100,20);
}

</script>

</body>
</html>
