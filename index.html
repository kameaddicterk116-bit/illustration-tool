<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1">
<title>らくがき生成</title>
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}
body{
font-family:
sans-serif;
background:#f6f6f6;
padding:24px;
display:flex;
justify-content:center;
}
.card{
width:100%;
max-width:420px;
background:white;
padding:24px;
border-radius:20px;
}
h1{
font-size:26px;
margin-bottom:8px;
}
.sub{
color:#666;
margin-bottom:18px;
}
input{
width:100%;
padding:14px;
font-size:18px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:14px;
}
button{
width:100%;
padding:16px;
background:black;
color:white;
border:none;
border-radius:14px;
font-size:16px;
}
button:disabled{
opacity:.5;
}
.status{
margin-top:14px;
text-align:center;
color:#777;
}
.result{
margin-top:18px;
}
.result img{
width:100%;
display:block;
}
.download{
display:block;
margin-top:10px;
padding:12px;
text-align:center;
border:1px solid black;
color:black;
text-decoration:none;
border-radius:10px;
}
</style>
</head>
<body>
<div class="card">
<h1>
らくがき生成
</h1>
<p class="sub">
子供でもすぐ描ける単純な絵
</p>
<input
id="subject"
placeholder="ネコ、キツネ、消防士"
>
<button
id="btn">
生成
</button>
<div
class="status"
id="status">
</div>
<div
class="result"
id="result">
</div>
</div>
<script>
const normalize={
犬:"イヌ",
猫:"ネコ",
狐:"キツネ"
};
function buildPrompt(subject){
return encodeURIComponent(
`${subject}
child notebook doodle
single black line
very large empty space
unfinished
very low detail
symbol
simple shape
white background`
);
}
const btn=
document.getElementById(
"btn"
);
btn.onclick=()=>{
const raw=
document
.getElementById(
"subject"
)
.value
.trim();
const status=
document
.getElementById(
"status"
);
const result=
document
.getElementById(
"result"
);
if(!raw){
status.textContent=
"入力してください";
return;
}
btn.disabled=true;
status.textContent=
"生成中…";
result.innerHTML="";
const subject=
normalize[raw]
||
raw;
const seed=
Math.floor(
Math.random()
*999999
);
const url=
`https://image.pollinations.ai/prompt/${buildPrompt(subject)}&seed=${seed}&width=512&height=512&nologo=true`;
const img=
new Image();
img.onload=()=>{
status.textContent=
"完成";
result.innerHTML=`
<img src="${url}">
<a
class="download"
href="${url}"
target="_blank"
download="${subject}.png">
保存
</a>
`;
btn.disabled=false;
};
img.onerror=()=>{
status.textContent=
"失敗";
btn.disabled=false;
};
img.src=url;
};
</script>
</body>
</html>
