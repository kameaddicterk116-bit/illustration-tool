<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かんたん絵</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:
sans-serif;
background:#f6f6f6;
padding:24px;
display:flex;
justify-content:center;
}
.card{
background:white;
padding:24px;
border-radius:20px;
width:100%;
max-width:420px;
}
h1{
font-size:28px;
margin-bottom:6px;
}
.sub{
color:#666;
margin-bottom:18px;
}
input{
width:100%;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:12px;
}
button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}
#canvas{
margin-top:20px;
display:flex;
justify-content:center;
}
svg{
width:280px;
height:280px;
}
.download{
display:block;
margin-top:14px;
padding:12px;
text-align:center;
border:1px solid black;
border-radius:10px;
color:black;
text-decoration:none;
}
</style>
</head>
<body>
<div class="card">
<h1>
かんたん絵
</h1>
<p class="sub">
特徴だけ残して描く
</p>
<input
id="subject"
placeholder="ネコ、ゾウ、車、宇宙飛行士"
>
<button id="draw">
描く
</button>
<div id="canvas"></div>
<div id="save"></div>
</div>
<script>
const map={
ネコ:`
<circle cx="140" cy="150" r="60"/>
<polygon points="90,100 110,60 130,100"/>
<polygon points="150,100 170,60 190,100"/>
`,
イヌ:`
<circle cx="140" cy="150" r="60"/>
<line x1="90" y1="110" x2="75" y2="180"/>
<line x1="190" y1="110" x2="205" y2="180"/>
`,
ゾウ:`
<circle cx="140" cy="140" r="60"/>
<line x1="140" y1="190" x2="140" y2="250"/>
`,
ウサギ:`
<circle cx="140" cy="170" r="60"/>
<line x1="120" y1="40" x2="120" y2="110"/>
<line x1="160" y1="40" x2="160" y2="110"/>
`,
ペンギン:`
<ellipse
cx="140"
cy="150"
rx="55"
ry="75"/>
`,
車:`
<rect
x="60"
y="120"
width="160"
height="60"/>
<circle
cx="90"
cy="190"
r="20"/>
<circle
cx="190"
cy="190"
r="20"/>
`,
宇宙飛行士:`
<circle
cx="140"
cy="140"
r="70"/>
<circle
cx="140"
cy="140"
r="45"/>
`,
料理人:`
<rect
x="90"
y="60"
width="100"
height="40"/>
<circle
cx="140"
cy="170"
r="60"/>
`
};
function fallback(name){
return `
<text
x="140"
y="150"
text-anchor="middle"
font-size="24">
${name}
</text>
`;
}
draw.onclick=()=>{
const input=
subject.value.trim();
if(!input){
return;
}
const art=
map[input]
||
fallback(input);
const svg=`
<svg
viewBox="0 0 280 280"
fill="none"
stroke="black"
stroke-width="8"
stroke-linecap="round"
stroke-linejoin="round">
${art}
</svg>
`;
canvas.innerHTML=svg;
const blob=
new Blob(
[svg],
{
type:
"image/svg+xml"
}
);
const url=
URL.createObjectURL(
blob
);
save.innerHTML=`
<a
class="download"
href="${url}"
download="${input}.svg">
保存
</a>
`;
};
</script>
</body>
</html>
