<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>究極のシンプル生成</title>
<style>
  body { font-family: sans-serif; background: #fff; display: flex; justify-content: center; padding: 20px; }
  .card { width: 100%; max-width: 400px; }
  input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #000; border-radius: 0; }
  button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; }
  #result { margin-top: 20px; }
  img { width: 100%; border: 1px solid #000; }
</style>
</head>
<body>
<div class="card">
  <h3>誰の似顔絵を作りますか？</h3>
  <input type="text" id="subject" placeholder="例: 男性、女性、メガネの先生">
  <input type="text" id="features" placeholder="髪型や特徴（例: ショートヘア, 笑顔）">
  <button id="btn">生成する</button>
  <div id="result"></div>
</div>

<script>
document.getElementById('btn').addEventListener('click', () => {
  const sub = document.getElementById('subject').value;
  const feat = document.getElementById('features').value;
  const result = document.getElementById('result');
  
  // 究極にシンプルな構成にするための呪文（プロンプト）
  const prompt = encodeURIComponent(`${sub}, ${feat}, minimalist vector icon, thick black lines, white background, simple flat style`);
  const url = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&nologo=true&seed=${Math.random()}`;
  
  result.innerHTML = "生成中...";
  const img = new Image();
  img.onload = () => result.innerHTML = `<img src="${url}">`;
  img.src = url;
});
</script>
</body>
</html>
