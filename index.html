<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>シンプルイラスト生成</title>
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}
body{
font-family:-apple-system,"Hiragino Sans",sans-serif;
background:#f5f5f5;
padding:24px;
display:flex;
justify-content:center;
}
.card{
width:100%;
max-width:420px;
background:white;
padding:24px;
border-radius:20px;
box-shadow:
0 4px 18px
rgba(0,0,0,.08);
}
h1{
font-size:26px;
margin-bottom:6px;
}
.sub{
color:#666;
margin-bottom:18px;
}
input[type=text]{
width:100%;
padding:14px;
font-size:16px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:18px;
}
.style{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:18px;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:black;
color:white;
font-size:16px;
}
button:disabled{
opacity:.5;
}
.status{
margin-top:14px;
text-align:center;
color:#777;
}
.result{
margin-top:18px;
}
.result img{
width:100%;
display:block;
border-radius:12px;
}
.download{
display:block;
margin-top:10px;
padding:12px;
border:1px solid black;
border-radius:10px;
text-align:center;
color:black;
text-decoration:none;
}
</style>
</head>
<body>
<div class="card">
<h1>
イラスト生成
</h1>
<p class="sub">
特徴だけ残して単純化
</p>
<input
id="subject"
type="text"
placeholder="ネコ、キツネ、宇宙飛行士"
>
<div class="style">
<label>
<input
checked
type="radio"
name="style"
value="minimal line drawing">
線画
</label>
<label>
<input
type="radio"
name="style"
value="flat monochrome">
1色
</label>
</div>
<button id="btn">
生成
</button>
<div
class="status"
id="status">
</div>
<div
class="result"
id="result">
</div>
</div>
<script>
const normalize={
"犬":"イヌ",
"猫":"ネコ",
"狐":"キツネ"
};
const featureMap={
"ネコ":
"cat silhouette, point ears",
"イヌ":
"dog silhouette, floppy ears",
"キツネ":
"fox silhouette, triangle ears and tail",
"パンダ":
"eye patches only",
"クマ":
"bear silhouette",
"ウサギ":
"rabbit silhouette long ears",
"ゾウ":
"elephant silhouette trunk",
"ペンギン":
"penguin silhouette",
"宇宙飛行士":
"helmet only",
"料理人":
"chef hat only",
"医者":
"stethoscope only",
"消防士":
"helmet and hose",
"アインシュタイン":
"wild hair silhouette"
};
function buildPrompt(subject,style){
return encodeURIComponent(`
minimal illustration,
few lines,
maximum two features,
symbolic drawing,
recognizable shape,
silhouette first,
flat design,
uniform line width,
empty white background,
no realism,
no details,
no texture,
no expression,
no decoration,
avoid mascot,
avoid cute style,
avoid rendering,
easy to redraw,
icon simplicity,
${style},
${subject}
`);
}
document
.getElementById("btn")
.addEventListener(
"click",
()=>{
const raw=
document
.getElementById("subject")
.value
.trim();
const status=
document
.getElementById("status");
const result=
document
.getElementById("result");
const btn=
document
.getElementById("btn");
if(!raw){
status.textContent=
"入力してください";
return;
}
const fixed=
normalize[raw]
||
raw;
const subject=
featureMap[fixed]
||
`${fixed} simplified silhouette`;
const style=
document.querySelector(
'input[name="style"]:checked'
).value;
const prompt=
buildPrompt(
subject,
style
);
const seed=
Math.floor(
Math.random()
*999999
);
const url=
`https://image.pollinations.ai/prompt/${prompt}?width=640&height=640&seed=${seed}&nologo=true`;
btn.disabled=true;
status.textContent=
"生成中…";
result.innerHTML="";
const img=
new Image();
img.onload=()=>{
result.innerHTML=`
<img src="${url}">
<a
class="download"
href="${url}"
target="_blank"
download="${fixed}.png">
保存
</a>
`;
status.textContent=
"完成";
btn.disabled=false;
};
img.onerror=()=>{
status.textContent=
"生成失敗";
btn.disabled=false;
};
img.src=url;
}
);
</script>
</body>
</html>
