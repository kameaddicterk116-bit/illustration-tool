<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1">
<title>かんたん絵</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:#f5f5f5;
font-family:sans-serif;
display:flex;
justify-content:center;
padding:24px;
}
.card{
background:white;
padding:24px;
width:100%;
max-width:420px;
border-radius:18px;
}
h1{
font-size:28px;
margin-bottom:8px;
}
.sub{
color:#666;
margin-bottom:18px;
}
input{
width:100%;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:14px;
}
button{
width:100%;
padding:14px;
border:none;
background:black;
color:white;
font-size:16px;
border-radius:12px;
}
#canvas{
margin-top:20px;
display:flex;
justify-content:center;
}
svg{
width:260px;
height:260px;
}
.download{
display:block;
margin-top:14px;
text-align:center;
padding:12px;
border:1px solid black;
color:black;
text-decoration:none;
border-radius:10px;
}
</style>
</head>
<body>
<div class="card">
<h1>
かんたん絵
</h1>
<p class="sub">
特徴だけ描く
</p>
<input
id="subject"
placeholder="ネコ、ゾウ、車"
>
<button
id="drawBtn">
描く
</button>
<div
id="canvas">
</div>
<div
id="save">
</div>
</div>
<script>
const known={
ネコ:
[
["circle",140,150,55],
["triangle",110,95],
["triangle",170,95]
],
イヌ:
[
["circle",140,150,55],
["line",95,110,80,170],
["line",185,110,200,170]
],
ゾウ:
[
["circle",140,130,60],
["line",140,180,140,245]
],
ウサギ:
[
["circle",140,170,55],
["line",120,40,120,110],
["line",160,40,160,110]
],
車:
[
["rect",60,120,160,60],
["circle",90,190,18],
["circle",190,190,18]
],
宇宙飛行士:
[
["circle",140,140,70],
["circle",140,140,40]
]
};
function randomShape(word){
const code=
Array
.from(word)
.reduce(
(a,c)=>
a+
c.charCodeAt(0),
0
);
const type=
code%4;
if(type===0){
return [
["circle",140,140,60]
];
}
if(type===1){
return [
["triangle",140,180]
];
}
if(type===2){
return [
["rect",80,90,120,120]
];
}
return [
["circle",140,150,40],
["line",140,190,140,250]
];
}
function render(list){
let svg=`
<svg
viewBox="0 0 280 280"
fill="none"
stroke="black"
stroke-width="8"
stroke-linecap="round"
stroke-linejoin="round">
`;
list.forEach(
s=>{
if(s[0]==="circle"){
svg+=`
<circle
cx="${s[1]}"
cy="${s[2]}"
r="${s[3]}"/>
`;
}
if(s[0]==="line"){
svg+=`
<line
x1="${s[1]}"
y1="${s[2]}"
x2="${s[3]}"
y2="${s[4]}"/>
`;
}
if(s[0]==="rect"){
svg+=`
<rect
x="${s[1]}"
y="${s[2]}"
width="${s[3]}"
height="${s[4]}"/>
`;
}
if(s[0]==="triangle"){
svg+=`
<polygon
points="
${s[1]-25},
${s[2]}
${s[1]},
${s[2]-45}
${s[1]+25},
${s[2]}
"/>
`;
}
}
);
svg+=`
</svg>
`;
return svg;
}
drawBtn.onclick=()=>{
const name=
subject.value.trim();
if(!name){
return;
}
const shapes=
known[name]
||
randomShape(name);
const svg=
render(
shapes
);
canvas.innerHTML=
svg;
const blob=
new Blob(
[svg],
{
type:
"image/svg+xml"
}
);
const url=
URL.createObjectURL(
blob
);
save.innerHTML=
`
<a
class="download"
href="${url}"
download="${name}.svg">
保存
</a>
`;
};
</script>
</body>
</html>
