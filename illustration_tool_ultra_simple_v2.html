<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イラスト生成ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    height: fit-content;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  p.sub { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
  label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }
  input[type="text"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 1rem;
    margin-bottom: 16px;
  }
  .style-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .style-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.95rem;
    color: #333;
    cursor: pointer;
  }
  button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: #000;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.4; }
  .status {
    text-align: center;
    font-size: 0.85rem;
    color: #888;
    margin-top: 12px;
    min-height: 1.2em;
  }
  .result { margin-top: 16px; }
  .result img {
    width: 100%;
    border-radius: 10px;
    display: block;
  }
  .download {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #000;
    text-decoration: none;
    border: 1px solid #000;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<div class="card">
  <h1>イラスト生成ツール</h1>
  <p class="sub">人物・動物・名前を入力すると極限までシンプル化して似せて描画</p>

  <label>名前（例: キツネ、パンダ、宇宙飛行士、料理人）</label>
  <input type="text" id="subject" placeholder="例: キツネ、パンダ、宇宙飛行士" />

  <label>スタイル</label>
  <div class="style-group">
    <label><input type="radio" name="style" value="extreme minimal line art, fewest possible strokes, preserve only identity-defining features, no texture, white background" checked> シンプル線画</label>
    <label><input type="radio" name="style" value="extreme minimal flat illustration, preserve face silhouette and hairstyle, one color only, white background"> 1色ぬり</label>
  </div>

  <button id="btn">イラストを生成</button>
  <div class="status" id="status"></div>
  <div class="result" id="result"></div>
</div>

<script>
// 特徴的なパーツを補足するマッピング
const featureMap = {
  "人物": "minimal portrait, preserve identity cues only, face proportions simplified",
  "キツネ": "fox with pointed ears and bushy tail",
  "パンダ": "panda with black eye patches and round ears",
  "ウサギ": "rabbit with long ears",
  "クマ": "bear with round ears",
  "ネコ": "cat with pointy ears and whiskers",
  "イヌ": "dog with floppy ears and tail",
  "ゾウ": "elephant with long trunk and big ears",
  "ペンギン": "penguin with flippers and bow tie belly",
  "カエル": "frog with wide mouth and big eyes",
  "サル": "monkey with round head and long tail",
  "宇宙飛行士": "astronaut with round helmet and spacesuit",
  "料理人": "chef with tall hat and apron",
  "医者": "doctor with stethoscope and white coat",
  "消防士": "firefighter with helmet and hose",
  "警察官": "police officer with cap and badge",
};

document.getElementById('btn').addEventListener('click', () => {
  const subjectRaw = document.getElementById('subject').value.trim();
  const style = document.querySelector('input[name="style"]:checked').value;
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  if (!subjectRaw) {
    status.textContent = '名前を入力してください';
    return;
  }

  // 特徴マッピングがあれば使い、なければそのまま英語で送る
  const subject = featureMap[subjectRaw] || subjectRaw;
  const likeness = "extremely minimal icon, only silhouette + hair shape + face balance + distinctive features, avoid extra detail, preserve identity";
  const prompt = encodeURIComponent(`${subject}, ${likeness}, ${style}, ultra reduced lines, no texture, no shading, recognizable at thumbnail size`);
  const seed = Math.floor(Math.random() * 100000);
  const url = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&seed=${seed}&nologo=true`;

  btn.disabled = true;
  status.textContent = '生成中…（20〜40秒かかります）';
  result.innerHTML = '';

  const img = new Image();
  img.onload = () => {
    result.innerHTML = `
      <img src="${url}" alt="${subjectRaw}のイラスト">
      <a class="download" href="${url}" download="${subjectRaw}.png" target="_blank">画像をダウンロード</a>
    `;
    status.textContent = '生成が完了しました';
    btn.disabled = false;
  };
  img.onerror = () => {
    status.textContent = 'エラー: Pollinations.aiに接続できません。しばらく待ってから再試行してください。';
    btn.disabled = false;
  };
  img.src = url;
});
</script>
</body>
</html>
